<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSA Cards – Temporarily Down</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #080818;
      --bg-secondary: #0e0e28;
      --bg-tertiary: #161640;
      --text-primary: #eeeeff;
      --text-secondary: rgba(238, 238, 255, 0.65);
      --text-muted: rgba(238, 238, 255, 0.35);
      --accent-gold: #f0c040;
      --accent-red: #ff5252;
      --border-subtle: rgba(238, 238, 255, 0.06);
      --border-light: rgba(238, 238, 255, 0.1);
    }

    html, body {
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: radial-gradient(ellipse at 50% 0%, rgba(22, 22, 64, 0.8) 0%, #080818 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    /* subtle animated star-field */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(238,238,255,0.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 15%, rgba(238,238,255,0.1) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 60%, rgba(238,238,255,0.12) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(238,238,255,0.08) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 70%, rgba(238,238,255,0.1) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 90%, rgba(238,238,255,0.07) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(22, 22, 64, 0.6);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.5), 0 0 60px rgba(240, 192, 64, 0.04);
      backdrop-filter: blur(16px);
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: var(--text-primary);
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .logo span {
      background: linear-gradient(135deg, #f0c040 0%, #e6a020 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(255, 82, 82, 0.12);
      border: 1px solid rgba(255, 82, 82, 0.3);
      color: var(--accent-red);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.35rem 0.85rem;
      border-radius: 99px;
      margin-bottom: 1.75rem;
    }

    .status-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-red);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 1.25rem;
      line-height: 1.3;
    }

    p {
      color: var(--text-secondary);
      font-size: 0.975rem;
      line-height: 1.7;
    }

    .divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 1.75rem 0;
    }

    .footer-note {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .footer-note strong {
      color: var(--accent-gold);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span>CSA</span> Cards</div>

    <div class="status-badge">Site offline</div>

    <h1>Temporarily Down</h1>

    <p>
      There was an exploit and I'm at my friend's house, so I shut the site off.
      I'll bring it back up when I get home tonight.
    </p>

    <div class="divider"></div>

    <p class="footer-note">
      Thanks for your patience — <strong>back tonight.</strong>
    </p>
  </div>
</body>
</html>
